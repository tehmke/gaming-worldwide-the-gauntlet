<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Gauntlet — Monthly Gaming Raffle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap');
</style>
<style>
  :root{
    --bg:#0d0d14;
    --surface:#16161f;
    --surface2:#1e1e2a;
    --border:rgba(138,115,255,0.18);
    --accent:#7c5cfc;
    --accent2:#00e5a0;
    --text:#eeeef5;
    --muted:#7b7b99;
    --danger:#ff4d6d;
    --warn:#f5a623;
    --success:#00e5a0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'DM Sans',system-ui,-apple-system,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    padding:1.5rem 1rem;
    position:relative;
    overflow-x:hidden;
  }
  body::before{
    content:'';
    position:fixed;inset:0;
    background-image:
      linear-gradient(rgba(124,92,252,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,92,252,0.06) 1px, transparent 1px);
    background-size:40px 40px;
    pointer-events:none;
    z-index:0;
  }
  body::after{
    content:'';
    position:fixed;
    top:-200px;left:50%;
    transform:translateX(-50%);
    width:600px;height:400px;
    background:radial-gradient(ellipse at center, rgba(124,92,252,0.12) 0%, transparent 70%);
    pointer-events:none;
    z-index:0;
  }
  .container{max-width:560px;margin:0 auto;position:relative;z-index:1;}
  .site-header{text-align:center;margin-bottom:2rem;}
  .site-header h1{
    font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;
    font-size:52px;
    letter-spacing:3px;
    color:var(--text);
    line-height:1;
    margin-bottom:4px;
  }
  .site-header h1 span{color:var(--accent);}
  .site-header p{font-size:13px;color:var(--muted);letter-spacing:.05em;}
  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:1rem 1.25rem;
    margin-bottom:1rem;
  }
  .sec-label{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.08em;text-transform:uppercase;margin:0 0 8px;}
  input,button,select{font-family:'DM Sans',sans-serif;font-size:14px;}
  input[type=text],input[type=number],input[type=password]{
    width:100%;padding:8px 12px;
    border:1px solid var(--border);
    border-radius:8px;
    background:var(--surface2);
    color:var(--text);
    outline:none;height:38px;
  }
  input::placeholder{color:var(--muted);}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,252,0.15);}
  button{
    padding:8px 18px;
    border:1px solid var(--border);
    border-radius:8px;
    background:transparent;
    color:var(--text);
    cursor:pointer;
    font-size:14px;
    transition:all .15s;
  }
  button:hover{background:rgba(124,92,252,0.12);border-color:var(--accent);}
  button:active{transform:scale(0.97);}
  button:disabled{opacity:0.35;cursor:default;transform:none;}
  .big-btn{
    width:100%;padding:14px;
    font-size:15px;font-weight:500;
    margin-top:.75rem;
    background:var(--accent);
    border:none;color:#fff;
    border-radius:10px;
    letter-spacing:.02em;
    transition:opacity .15s,transform .1s;
  }
  .big-btn:hover{opacity:.88;background:var(--accent);}
  .big-btn:active{transform:scale(0.98);}
  .tab-bar{display:flex;gap:6px;margin-bottom:1.25rem;}
  .tab-btn{
    padding:6px 16px;font-size:13px;
    border-radius:20px;
    border:1px solid transparent;
    cursor:pointer;background:transparent;color:var(--muted);
    transition:all .15s;
  }
  .tab-btn.active{
    background:rgba(124,92,252,0.15);
    border-color:var(--accent);
    color:var(--text);font-weight:500;
  }
  .arena{
    background:var(--surface2);
    border:1px solid var(--border);
    border-radius:14px;
    padding:1.5rem;text-align:center;
    min-height:280px;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:12px;
  }
  .challenge-title{font-size:20px;font-weight:500;color:var(--text);}
  .challenge-sub{font-size:13px;color:var(--muted);}
  .progress-wrap{width:100%;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;border:1px solid var(--border);}
  .progress-fill{height:5px;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s;}
  .score-pill{font-size:13px;padding:4px 14px;border-radius:20px;background:rgba(124,92,252,0.15);color:#b8a5ff;font-weight:500;display:inline-block;border:1px solid rgba(124,92,252,0.3);}
  .lb-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
  .lb-row:last-child{border-bottom:none;}
  .avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;}
  .target-zone{
    width:64px;height:64px;border-radius:50%;
    background:rgba(124,92,252,0.15);
    border:2px solid var(--accent);
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:500;color:#b8a5ff;
    user-select:none;
    transition:transform .1s,background .1s;
  }
  .target-zone:hover{background:rgba(124,92,252,0.25);transform:scale(1.05);}
  .mash-btn{
    padding:16px 44px;font-size:16px;font-weight:500;border-radius:10px;
    background:var(--accent);border:none;color:#fff;
    transition:opacity .1s,transform .1s;
  }
  .mash-btn:hover{opacity:.88;}
  .scramble-opt{
    padding:8px 18px;margin:4px;border-radius:8px;font-size:13px;cursor:pointer;
    background:var(--surface);border:1px solid var(--border);color:var(--text);
    transition:all .15s;
  }
  .scramble-opt:hover{background:rgba(124,92,252,0.12);border-color:var(--accent);}
  .grid-btn{width:52px;height:52px;border-radius:8px;border:none;cursor:pointer;transition:transform .1s,filter .1s;}
  .grid-btn:active{transform:scale(.9);}
  .simon-cmd{
    font-size:20px;font-weight:500;padding:14px 28px;border-radius:10px;margin:4px 0;
    background:var(--surface);border:1px solid var(--border);color:var(--text);
    letter-spacing:.01em;
  }
  .pts-flash{font-size:16px;font-weight:500;margin-top:8px;letter-spacing:.02em;}
  .tier-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;display:inline-block;margin-bottom:4px;letter-spacing:.04em;text-transform:uppercase;}
  .winner-badge{font-size:11px;padding:2px 8px;border-radius:20px;background:rgba(0,229,160,0.15);color:var(--accent2);font-weight:500;border:1px solid rgba(0,229,160,0.3);}
  .flex-row{display:flex;gap:8px;align-items:center;}
  .lb-tab-btn{padding:4px 12px;font-size:12px;border-radius:20px;border:1px solid transparent;cursor:pointer;background:transparent;color:var(--muted);}
  .lb-tab-btn.active{background:rgba(124,92,252,0.15);border-color:var(--accent);color:var(--text);font-weight:500;}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(124,92,252,0.2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .status-msg{font-size:13px;color:var(--muted);margin-top:8px;min-height:18px;}
  .rank-num{font-size:13px;color:var(--muted);min-width:20px;font-variant-numeric:tabular-nums;}
  .hold-bar-wrap{width:220px;height:10px;background:var(--surface);border-radius:5px;overflow:hidden;border:1px solid var(--border);}
  .hold-bar-fill{height:10px;border-radius:5px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:none;}
</style>
</head>
<body>
<div class="container">
  <div class="site-header">
    <h1>The <span>Gauntlet</span></h1>
    <p>Monthly Gaming Raffle — Top 10 Win</p>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="showTab('play')">Play</button>
    <button class="tab-btn" onclick="showTab('lb')">Leaderboard</button>
    <button class="tab-btn" onclick="showTab('admin')">Admin</button>
  </div>

  <!-- PLAY TAB -->
  <div id="tab-play">
    <div class="card" id="screen-register">
      <p class="sec-label">Your name</p>
      <div class="flex-row">
        <input id="playerName" type="text" placeholder="Enter your name to play..." onkeydown="if(event.key==='Enter')startOrResume()"/>
        <button onclick="startOrResume()" id="enterBtn">Enter the gauntlet</button>
      </div>
      <div id="attemptStatus" class="status-msg"></div>
    </div>
    <div id="gameArea" style="display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;">
        <span style="font-size:13px;color:var(--muted);" id="challengeLabel">Challenge 1 of 3</span>
        <span style="font-size:13px;font-weight:500;" id="runScore">Score: 0 / 300</span>
      </div>
      <div class="progress-wrap" style="margin-bottom:1rem;"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="arena" id="arena"></div>
      <div id="betweenChallenge" style="display:none;text-align:center;margin-top:1rem;">
        <button class="big-btn" id="nextChallengeBtn">Next challenge</button>
      </div>
    </div>
  </div>

  <!-- LEADERBOARD TAB -->
  <div id="tab-lb" style="display:none;">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;">
        <p style="font-size:15px;font-weight:500;" id="lbTitle">Leaderboard</p>
        <span class="score-pill" id="lbCount">0 players</span>
      </div>
      <div style="display:flex;gap:6px;margin-bottom:1rem;">
        <button class="lb-tab-btn active" id="lbTabCurrent" onclick="switchLbTab('current')">This month</button>
        <button class="lb-tab-btn" id="lbTabAllTime" onclick="switchLbTab('alltime')">All time</button>
        <button onclick="loadLeaderboard()" style="margin-left:auto;font-size:12px;padding:4px 10px;">Refresh</button>
      </div>
      <div id="lbList"><div style="font-size:13px;color:var(--muted);"><span class="spinner"></span>Loading...</div></div>
    </div>
  </div>

  <!-- ADMIN TAB -->
  <div id="tab-admin" style="display:none;">
    <div id="admin-locked" class="card" style="text-align:center;padding:2rem 1rem;">
      <p style="font-size:15px;font-weight:500;margin-bottom:1rem;">Admin access required</p>
      <div class="flex-row" style="justify-content:center;">
        <input id="adminPwInput" type="password" placeholder="Enter admin password..." style="max-width:240px;" onkeydown="if(event.key==='Enter')checkAdminPw()"/>
        <button onclick="checkAdminPw()">Unlock</button>
      </div>
      <p id="adminPwError" style="font-size:13px;color:var(--danger);margin-top:8px;min-height:18px;"></p>
    </div>
    <div id="admin-panel" style="display:none;">
      <div class="card">
        <p class="sec-label">Month label</p>
        <div class="flex-row" style="margin-bottom:1rem;">
          <input id="monthLabel" type="text" placeholder="e.g. April 2026"/>
          <button onclick="saveMonth()">Save</button>
        </div>
        <p class="sec-label">Top 10 winners — current month</p>
        <div id="adminWinners" style="margin-bottom:1rem;font-size:13px;color:var(--muted);">Loading...</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;">
          <button onclick="copyWinners()">Copy winner list</button>
          <button onclick="resetMonth()" style="color:var(--danger);border-color:var(--danger);">Reset month + clear scores</button>
        </div>
        <div style="border-top:0.5px solid rgba(0,0,0,0.1);padding-top:1rem;">
          <button onclick="lockAdmin()" style="font-size:12px;color:var(--muted);">Lock admin</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// PASTE YOUR APPS SCRIPT WEB APP URL BELOW
// ============================================================
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwFEgdlcZl3wsU_7G30X0H2AkyHo13OK7uT35Y5ECKIV6oO1C-tYKmnNmBBWHikFwC8/exec';
// ============================================================

const ADMIN_PW = 'gamingworldwide@block#1';
const MAX_ATTEMPTS = 3;
let adminUnlocked = false;
let lbData = { current: [], allTime: [], monthLabel: '' };
let activeLbTab = 'current';
let localAttempts = {};

const AVATAR_COLORS=[['#EEEDFE','#3C3489'],['#E1F5EE','#085041'],['#FAECE7','#712B13'],['#E6F1FB','#0C447C'],['#FAEEDA','#633806'],['#FBEAF0','#72243E'],['#EAF3DE','#27500A'],['#FCEBEB','#791F1F']];

const GAME_TITLES=['Minecraft','Fortnite','Valorant','Overwatch','Terraria','Cyberpunk','Warzone','Hades','Celeste','Stardew','Hollow Knight','Among Us','Rust','Palworld','Elden Ring','Skyrim','Destiny 2','League of Legends','Dead by Daylight','Fall Guys','Apex Legends','Path of Exile','Rainbow Six Siege','Deep Rock Galactic','No Mans Sky','Monster Hunter','Rocket League','Sea of Thieves','Baldurs Gate','Lethal Company','Satisfactory','Phasmophobia','Splitgate','Grounded','Bloodborne','Undertale','Cuphead','Disco Elysium','Control','Outriders'];

const PHRASES=['press F to pay respects','git gud or go home','have you tried turning it off and on again','the cake is a lie','all your base are belong to us','stay a while and listen','its dangerous to go alone','do a barrel roll','you died','a winner is you','would you kindly','war never changes','wake me when you need me','what is a man a miserable little pile of secrets','its super effective','praise the sun','kept you waiting huh','the numbers mason what do they mean','you have died of dysentery','stay frosty','do you feel in charge','the floor is lava','respawning in three two one','this is fine everything is fine','get over here','hadouken','finish him','player two has entered the game','i used to be an adventurer like you then i took an arrow in the knee','snakes on a plane wait wrong franchise'];

const SIMON_COMMANDS=[
  {text:'Jump!',isSimon:true},{text:'Crouch!',isSimon:false},{text:'Simon says duck!',isSimon:true},{text:'Simon says spin!',isSimon:true},{text:'Reload!',isSimon:false},{text:'Simon says press A!',isSimon:true},{text:'Respawn!',isSimon:false},{text:'Simon says gg!',isSimon:true},{text:'Rage quit!',isSimon:false},{text:'Simon says heal!',isSimon:true},{text:'Sprint!',isSimon:false},{text:'Simon says dodge!',isSimon:true},{text:'Taunt!',isSimon:false},{text:'Simon says emote!',isSimon:true},{text:'Loot!',isSimon:false},{text:'Simon says ping!',isSimon:true},{text:'Revive!',isSimon:false},{text:'Simon says swap weapons!',isSimon:true},{text:'Panic!',isSimon:false},{text:'Simon says go go go!',isSimon:true},{text:'Buy something!',isSimon:false},{text:'Simon says back to base!',isSimon:true},{text:'Logout!',isSimon:false},{text:'Simon says ult!',isSimon:true},{text:'Report a bug!',isSimon:false},{text:'Simon says carry harder!',isSimon:true},{text:'Uninstall!',isSimon:false},{text:'Simon says touch grass!',isSimon:true},{text:'Alt F4!',isSimon:false},{text:'Simon says one more game!',isSimon:true}
];

const MEMORY_TIERS=[
  {label:'Easy',pads:3,seqLen:3,colors:['#534AB7','#1D9E75','#D85A30'],letters:'ABC',basePoints:70},
  {label:'Medium',pads:4,seqLen:4,colors:['#534AB7','#1D9E75','#D85A30','#185FA5'],letters:'ABCD',basePoints:85},
  {label:'Hard',pads:5,seqLen:5,colors:['#534AB7','#1D9E75','#D85A30','#185FA5','#BA7517'],letters:'ABCDE',basePoints:100},
];
const TIER_STYLES=[{bg:'#E1F5EE',color:'#085041'},{bg:'#FAEEDA',color:'#633806'},{bg:'#FCEBEB',color:'#791F1F'}];

let state={name:'',runScore:0,challengeIdx:0,challenges:[],phase:'idle'};

// ---- API ----
async function apiGet(params){
  const url=SHEET_URL+'?'+new URLSearchParams(params);
  const r=await fetch(url);return r.json();
}
async function apiPost(body){
  const r=await fetch(SHEET_URL,{method:'POST',body:JSON.stringify(body)});return r.json();
}

// ---- LOCAL ATTEMPT TRACKING ----
// Attempts are tracked locally per-browser so players can't exceed 3 tries.
// The Sheet stores best score only; attempt count is enforced client-side.
function getLocalAttempts(name){
  try{
    const key='gauntlet_attempts_v1';
    const d=JSON.parse(localStorage.getItem(key)||'{}');
    return d[name.toLowerCase()]||0;
  }catch(e){return 0;}
}
function incrementLocalAttempts(name){
  try{
    const key='gauntlet_attempts_v1';
    const d=JSON.parse(localStorage.getItem(key)||'{}');
    d[name.toLowerCase()]=(d[name.toLowerCase()]||0)+1;
    localStorage.setItem(key,JSON.stringify(d));
  }catch(e){}
}
function clearLocalAttempts(){
  try{localStorage.removeItem('gauntlet_attempts_v1');}catch(e){}
}

// ---- TABS ----
function showTab(t){
  ['play','lb','admin'].forEach(id=>document.getElementById('tab-'+id).style.display=id===t?'block':'none');
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['play','lb','admin'][i]===t));
  if(t==='lb')loadLeaderboard();
  if(t==='admin'&&adminUnlocked)loadAdminData();
}

function switchLbTab(tab){
  activeLbTab=tab;
  document.getElementById('lbTabCurrent').classList.toggle('active',tab==='current');
  document.getElementById('lbTabAllTime').classList.toggle('active',tab==='alltime');
  renderLB();
}

// ---- LEADERBOARD ----
async function loadLeaderboard(){
  document.getElementById('lbList').innerHTML='<div style="font-size:13px;color:var(--muted);"><span class="spinner"></span>Loading...</div>';
  try{
    const data=await apiGet({action:'getLeaderboard'});
    lbData=data;
    if(data.monthLabel)document.getElementById('monthLabel').value=data.monthLabel;
    renderLB();
  }catch(e){
    document.getElementById('lbList').innerHTML='<p style="font-size:13px;color:var(--danger);">Could not load leaderboard. Check your SHEET_URL.</p>';
  }
}

function renderLB(){
  const list=document.getElementById('lbList');
  const isCurrentTab=activeLbTab==='current';
  const entries=isCurrentTab?lbData.current:lbData.allTime;
  const ml=lbData.monthLabel||'This month';
  document.getElementById('lbTitle').textContent=isCurrentTab?`${ml}'s leaderboard`:'All-time leaderboard';
  document.getElementById('lbCount').textContent=`${entries.length} player${entries.length!==1?'s':''}`;
  if(!entries.length){list.innerHTML='<p style="font-size:13px;color:var(--muted);">No scores yet.</p>';return;}
  list.innerHTML=entries.map((e,i)=>{
    const [bg,fg]=AVATAR_COLORS[i%AVATAR_COLORS.length];
    const initials=e.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const isWinner=i<10;
    return `<div class="lb-row"><span style="font-size:13px;color:var(--muted);min-width:20px;">${i+1}</span><div class="avatar" style="background:${bg};color:${fg};">${initials}</div><span style="flex:1;font-size:14px;${isWinner?'font-weight:500;':''}">${e.name}</span>${isWinner?'<span class="winner-badge">winner</span>':''}<span style="font-size:13px;color:var(--muted);margin-left:8px;">${e.bestScore}<span style="font-size:11px;"> / 300</span></span></div>`;
  }).join('');
}

// ---- ADMIN ----
function checkAdminPw(){
  if(document.getElementById('adminPwInput').value===ADMIN_PW){
    adminUnlocked=true;
    document.getElementById('admin-locked').style.display='none';
    document.getElementById('admin-panel').style.display='block';
    loadAdminData();
  } else {
    document.getElementById('adminPwError').textContent='Incorrect password.';
    setTimeout(()=>document.getElementById('adminPwError').textContent='',2000);  }
}
function lockAdmin(){
  adminUnlocked=false;
  document.getElementById('admin-locked').style.display='block';
  document.getElementById('admin-panel').style.display='none';
  document.getElementById('adminPwInput').value='';
}
async function loadAdminData(){
  if(!lbData.current.length)await loadLeaderboard();
  renderAdminWinners();
}
function renderAdminWinners(){
  const top=lbData.current.slice(0,10);
  document.getElementById('adminWinners').innerHTML=top.length?top.map((e,i)=>`<div style="padding:4px 0;border-bottom:1px solid var(--border);">#${i+1} ${e.name} — ${e.bestScore}/300</div>`).join(''):'No scores yet.';
}
async function saveMonth(){
  const label=document.getElementById('monthLabel').value;
  await apiPost({action:'setMonth',password:ADMIN_PW,monthLabel:label});
  lbData.monthLabel=label;renderLB();
}
async function resetMonth(){
  if(!confirm('Reset current month scores? All-time records are kept. This cannot be undone.'))return;
  const label=document.getElementById('monthLabel').value;
  await apiPost({action:'resetMonth',password:ADMIN_PW,monthLabel:label});
  clearLocalAttempts();
  await loadLeaderboard();
  renderAdminWinners();
}
function copyWinners(){
  const ml=lbData.monthLabel||'This month';
  const top=lbData.current.slice(0,10);
  const lines=[`${ml} — Gauntlet Winners`,'',...top.map((e,i)=>`#${i+1} ${e.name} — ${e.bestScore}/300`)];
  navigator.clipboard.writeText(lines.join('\n')).then(()=>{const btn=event.target;btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy winner list',2000);});
}

// ---- GAME ----
async function startOrResume(){
  const name=document.getElementById('playerName').value.trim();
  if(!name)return;
  state.name=name;
  const attempts=getLocalAttempts(name);
  const left=MAX_ATTEMPTS-attempts;
  if(left<=0){
    document.getElementById('attemptStatus').innerHTML='<span style="color:var(--danger);">No attempts left this month. Check the leaderboard!</span>';
    return;
  }
  document.getElementById('screen-register').style.display='none';
  document.getElementById('gameArea').style.display='block';
  beginRun();
}

function beginRun(){
  state.runScore=0;state.challengeIdx=0;state.challenges=pickChallenges();
  document.getElementById('betweenChallenge').style.display='none';
  document.querySelectorAll('#gameArea .big-btn.extra').forEach(b=>b.remove());
  updateRunScore();loadChallenge();
}

const CHALLENGE_POOL=[
  {id:'mole',fn:runMole},{id:'mash',fn:runMash},{id:'scramble',fn:runScramble},
  {id:'memory',fn:runMemory},{id:'countdown',fn:runCountdown},{id:'nored',fn:runNoRed},
  {id:'typeit',fn:runTypeIt},{id:'oddone',fn:runOddOne},{id:'holdit',fn:runHoldIt},{id:'simon',fn:runSimon}
];
function pickChallenges(){
  const pool=[...CHALLENGE_POOL];const picked=[];
  while(picked.length<3&&pool.length){const i=Math.floor(Math.random()*pool.length);picked.push(pool.splice(i,1)[0]);}
  return picked;
}
function loadChallenge(){
  const c=state.challenges[state.challengeIdx];
  document.getElementById('challengeLabel').textContent=`Challenge ${state.challengeIdx+1} of 3`;
  document.getElementById('progressFill').style.width=`${(state.challengeIdx/3)*100}%`;
  document.getElementById('betweenChallenge').style.display='none';
  const arena=document.getElementById('arena');arena.innerHTML='';
  state.phase='playing';c.fn(arena);
}
function norm(raw,min,max){return Math.round(Math.max(0,Math.min(100,((raw-min)/(max-min))*100)));}
function challengeDone(pts,label){
  const capped=Math.max(0,Math.min(100,Math.round(pts)));
  state.runScore+=capped;state.phase='between';updateRunScore();
  const arena=document.getElementById('arena');
  const msg=document.createElement('div');msg.className='pts-flash';
  msg.style.color=capped>60?'var(--success)':capped>30?'var(--warn)':'var(--danger)';
  msg.textContent=label||`+${capped} pts`;arena.appendChild(msg);
  document.getElementById('betweenChallenge').style.display='block';
  const isLast=state.challengeIdx>=2;
  const btn=document.getElementById('nextChallengeBtn');
  btn.textContent=isLast?'See my result':'Next challenge';
  btn.onclick=isLast?finishRun:nextChallenge;
  document.getElementById('progressFill').style.width=`${((state.challengeIdx+1)/3)*100}%`;
}
function nextChallenge(){state.challengeIdx++;loadChallenge();}
function updateRunScore(){document.getElementById('runScore').textContent=`Score: ${state.runScore} / ${state.challengeIdx*100}`;}

async function finishRun(){
  const name=state.name,score=state.runScore;
  incrementLocalAttempts(name);
  const left=MAX_ATTEMPTS-getLocalAttempts(name);

  const arena=document.getElementById('arena');
  const pct=Math.round((score/300)*100);
  arena.innerHTML=`<p class="challenge-title">Run complete!</p><p style="font-size:36px;font-weight:500;margin:0;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;">${score} <span style="font-size:18px;color:var(--muted);">/ 300</span></p><p style="font-size:13px;color:var(--muted);margin:4px 0;">${pct>=80?'legendary run!':pct>=60?'solid performance!':pct>=40?'not bad!':'keep practicing!'}</p><p class="challenge-sub"><span class="spinner"></span>Saving to leaderboard...</p>`;
  document.getElementById('betweenChallenge').style.display='none';
  document.getElementById('progressFill').style.width='100%';

  try{
    await apiPost({action:'submitScore',name,score,attempts:1});
    arena.querySelector('.challenge-sub').textContent=`Score saved! ${left} attempt${left!==1?'s':''} left this month.`;
  }catch(e){
    arena.querySelector('.challenge-sub').textContent='Could not save score — check your connection.';
  }

  const btn=document.createElement('button');btn.className='big-btn extra';
  btn.textContent=left>0?`Try again (${left} left)`:'View leaderboard';
  btn.onclick=left>0?()=>{arena.innerHTML='';beginRun();}:()=>showTab('lb');
  document.getElementById('gameArea').appendChild(btn);
}

// ---- CHALLENGES ----
function runMole(arena){
  let hits=0;const endTime=Date.now()+5000;let moleTimer=null;
  arena.innerHTML=`<p class="challenge-title">Whack the mole!</p><p class="challenge-sub">Click it every time it appears!</p><div style="width:200px;height:120px;background:var(--surface);border:1px solid var(--border);border-radius:10px;position:relative;margin:8px 0;" id="moleField"></div><div style="display:flex;gap:24px;"><span style="font-size:13px;color:var(--muted);">hits: <strong id="moleHits" style="color:var(--text);">0</strong></span><span style="font-size:13px;color:var(--muted);">time: <strong id="moleClock" style="color:var(--text);">5.0</strong>s</span></div>`;
  const field=arena.querySelector('#moleField');
  function placeMole(){field.innerHTML='';const btn=document.createElement('div');btn.className='target-zone';btn.style.cssText='position:absolute;';btn.style.left=Math.floor(Math.random()*120)+'px';btn.style.top=Math.floor(Math.random()*40)+'px';btn.textContent='HIT';btn.onclick=()=>{hits++;arena.querySelector('#moleHits').textContent=hits;clearTimeout(moleTimer);placeMole();};field.appendChild(btn);moleTimer=setTimeout(placeMole,700+Math.random()*400);}
  placeMole();
  const iv=setInterval(()=>{const left=Math.max(0,(endTime-Date.now())/1000);const el=arena.querySelector('#moleClock');if(el)el.textContent=left.toFixed(1);if(left<=0){clearInterval(iv);clearTimeout(moleTimer);field.innerHTML='';const pts=norm(hits,0,12);challengeDone(pts,`+${pts} pts — ${hits} hits!`);}},100);
}
function runMash(arena){
  let count=0;const endTime=Date.now()+4000;
  arena.innerHTML=`<p class="challenge-title">Button masher!</p><p class="challenge-sub">Spam as fast as you can!</p><p style="font-size:48px;font-weight:500;margin:0;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;" id="mashCount">0</p><button class="mash-btn" id="mashBtn">MASH</button><span style="font-size:13px;color:var(--muted);" id="mashClock">4.0s left</span>`;
  const btn=arena.querySelector('#mashBtn');
  const handler=()=>{count++;arena.querySelector('#mashCount').textContent=count;};
  btn.addEventListener('click',handler);btn.addEventListener('touchstart',e=>{e.preventDefault();handler();});
  const iv=setInterval(()=>{const left=Math.max(0,(endTime-Date.now())/1000);const el=arena.querySelector('#mashClock');if(el)el.textContent=left.toFixed(1)+'s left';if(left<=0){clearInterval(iv);btn.disabled=true;const pts=norm(count,0,60);challengeDone(pts,`+${pts} pts — ${count} presses!`);}},100);
}
function scrambleStr(s){return s.split('').sort(()=>Math.random()-.5).join('');}
function runScramble(arena){
  const correct=GAME_TITLES[Math.floor(Math.random()*GAME_TITLES.length)];
  let scrambled=scrambleStr(correct.toUpperCase());
  while(scrambled===correct.toUpperCase())scrambled=scrambleStr(correct.toUpperCase());
  const opts=[correct];
  while(opts.length<4){const r=GAME_TITLES[Math.floor(Math.random()*GAME_TITLES.length)];if(!opts.includes(r))opts.push(r);}
  opts.sort(()=>Math.random()-.5);
  const startTime=Date.now();
  arena.innerHTML=`<p class="challenge-title">Unscramble the game!</p><p style="font-size:19px;font-weight:500;letter-spacing:3px;margin:4px 0;word-break:break-all;">${scrambled}</p><div style="display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:8px;">${opts.map(o=>`<button class="scramble-opt" onclick="scrambleAnswer(this,'${o.replace(/'/g,"\\'")}','${correct.replace(/'/g,"\\'")}' )">${o}</button>`).join('')}</div><p style="font-size:12px;color:var(--muted);margin-top:8px;">Faster = more points</p>`;
  window._scrambleStart=startTime;
}
window.scrambleAnswer=function(btn,choice,correct){
  document.querySelectorAll('.scramble-opt').forEach(b=>b.disabled=true);
  if(choice===correct){const elapsed=(Date.now()-window._scrambleStart)/1000;const pts=elapsed<2?100:elapsed<4?85:elapsed<6?70:55;btn.style.background='rgba(0,229,160,0.18)';btn.style.color='#00e5a0';challengeDone(pts,`+${pts} pts — solved in ${elapsed.toFixed(1)}s!`);}
  else{btn.style.background='rgba(255,77,109,0.18)';btn.style.color='#ff4d6d';document.querySelectorAll('.scramble-opt').forEach(b=>{if(b.textContent===correct){b.style.background='rgba(0,229,160,0.18)';b.style.color='#00e5a0';}});challengeDone(0,'No points — wrong answer!');}
};
function runMemory(arena){
  const tierIdx=Math.floor(Math.random()*MEMORY_TIERS.length);
  const tier=MEMORY_TIERS[tierIdx];const ts=TIER_STYLES[tierIdx];
  const seq=Array.from({length:tier.seqLen},()=>Math.floor(Math.random()*tier.pads));
  let playerSeq=[];let showing=true;let mistakes=0;
  function padSize(){return tier.pads<=3?80:tier.pads===4?72:60;}
  function renderPads(enabled){const sz=padSize();const cols=tier.pads<=4?tier.pads:3;return `<div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:8px;width:${cols*(sz+8)}px;">${tier.colors.map((c,i)=>`<button style="width:${sz}px;height:${sz}px;background:${enabled?c:c+'55'};border:none;border-radius:8px;cursor:${enabled?'pointer':'default'};color:#fff;font-weight:500;font-size:14px;" id="pad${i}" onclick="memPad(${i})">${tier.letters[i]}</button>`).join('')}</div>`;}
  arena.innerHTML=`<div class="tier-badge" style="background:${ts.bg};color:${ts.color};">${tier.label} — ${tier.seqLen} steps</div><p class="challenge-title">Remember the sequence!</p><p class="challenge-sub" id="memSub">Watch carefully...</p><div id="memPads">${renderPads(false)}</div>`;
  let si=0;
  function flashSeq(){if(si>=seq.length){showing=false;setTimeout(()=>{const sub=arena.querySelector('#memSub');if(sub)sub.textContent='Now repeat it!';const pads=arena.querySelector('#memPads');if(pads)pads.innerHTML=renderPads(true);},400);return;}const pad=arena.querySelector(`#pad${seq[si]}`);if(pad){pad.style.opacity='1';pad.style.transform='scale(1.15)';setTimeout(()=>{if(pad){pad.style.opacity='0.55';pad.style.transform='scale(1)';}si++;setTimeout(flashSeq,tier.pads>=5?250:300);},tier.pads>=5?380:450);}}
  setTimeout(flashSeq,600);
  window.memPad=function(i){if(showing)return;playerSeq.push(i);const idx=playerSeq.length-1;if(playerSeq[idx]!==seq[idx]){mistakes++;if(mistakes>=2){challengeDone(0,'No points — too many mistakes!');return;}const sub=arena.querySelector('#memSub');if(sub)sub.textContent='Wrong! One mistake left...';playerSeq=[];}else if(playerSeq.length===seq.length){const pts=mistakes===0?tier.basePoints:Math.round(tier.basePoints*0.5);challengeDone(pts,`+${pts} pts — ${tier.label.toLowerCase()} tier, ${mistakes===0?'perfect!':'one mistake!'}`);}};
}
function runCountdown(arena){
  let started=false,startTime=0;
  arena.innerHTML=`<p class="challenge-title">Stop the clock!</p><p class="challenge-sub">Hit stop as close to exactly 3.00 seconds as you can.</p><p style="font-size:56px;font-weight:400;margin:0;font-family:'Bebas Neue',sans-serif;letter-spacing:3px;color:var(--accent2);" id="cdDisplay">0.00</p><button class="mash-btn" id="cdBtn" onclick="cdAction()">Start</button>`;
  let iv=null;
  window.cdAction=function(){if(!started){started=true;startTime=Date.now();arena.querySelector('#cdBtn').textContent='Stop!';iv=setInterval(()=>{const el=arena.querySelector('#cdDisplay');if(el)el.textContent=((Date.now()-startTime)/1000).toFixed(2);},30);}else{clearInterval(iv);const elapsed=(Date.now()-startTime)/1000;const diff=Math.abs(elapsed-3.00);const pts=diff<0.05?100:diff<0.15?85:diff<0.3?65:diff<0.6?40:diff<1.0?20:5;arena.querySelector('#cdDisplay').textContent=elapsed.toFixed(2);arena.querySelector('#cdBtn').disabled=true;challengeDone(pts,`+${pts} pts — ${elapsed.toFixed(2)}s (target: 3.00s)`);}};
}
function runNoRed(arena){
  let done=false;const endTime=Date.now()+6000;
  const gridSize=16;const grid=Array.from({length:gridSize},()=>Math.random()<0.35?'red':'green');
  const totalGreens=grid.filter(c=>c==='green').length;let greensLeft=totalGreens;let reds=0;
  function renderGrid(){return `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;width:220px;">${grid.map((c,i)=>`<button class="grid-btn" id="gb${i}" style="background:${c==='green'?'#1D9E75':'#E24B4A'};" onclick="noRedClick(${i})"></button>`).join('')}</div>`;}
  arena.innerHTML=`<p class="challenge-title">Don't click the red!</p><p class="challenge-sub">Click every green — avoid red!</p><div id="noRedGrid">${renderGrid()}</div><div style="display:flex;gap:24px;margin-top:8px;"><span style="font-size:13px;color:var(--muted);">greens left: <strong id="nrScore" style="color:var(--text);">${totalGreens}</strong></span><span style="font-size:13px;color:var(--muted);">time: <strong id="nrClock" style="color:var(--text);">6.0</strong>s</span></div>`;
  window.noRedClick=function(i){if(done)return;const btn=document.getElementById('gb'+i);if(!btn||btn.disabled)return;if(grid[i]==='green'){greensLeft--;btn.style.background='#00e5a0';btn.disabled=true;arena.querySelector('#nrScore').textContent=greensLeft;if(greensLeft===0){done=true;challengeDone(100,'+100 pts — all greens found!');}}else{reds++;btn.style.background='#ff4d6d';btn.disabled=true;}};
  const iv=setInterval(()=>{const left=Math.max(0,(endTime-Date.now())/1000);const el=arena.querySelector('#nrClock');if(el)el.textContent=left.toFixed(1);if(left<=0&&!done){done=true;clearInterval(iv);const clicked=totalGreens-greensLeft;const pts=norm(clicked-(reds*2),0,totalGreens);challengeDone(pts,`+${pts} pts — ${clicked}/${totalGreens} greens, ${reds} reds hit`);}},100);
}
function runTypeIt(arena){
  const phrase=PHRASES[Math.floor(Math.random()*PHRASES.length)];
  const dur=10000;let finished=false;
  const escaped=phrase.replace(/'/g,"\\'");
  arena.innerHTML=`<p class="challenge-title">Type it fast!</p><p style="font-size:14px;font-weight:500;margin:4px 0;color:var(--text);line-height:1.5;">${phrase}</p><input id="typeInput" type="text" placeholder="Start typing..." style="width:100%;margin-top:8px;" oninput="checkType('${escaped}')"/><div style="margin-top:8px;"><span style="font-size:13px;color:var(--muted);">time: <strong id="typeClock" style="color:var(--text);">10.0</strong>s</span></div>`;
  setTimeout(()=>{const inp=arena.querySelector('#typeInput');if(inp)inp.focus();},100);
  const startTime=Date.now();
  const iv=setInterval(()=>{const left=Math.max(0,(dur-(Date.now()-startTime))/1000);const el=arena.querySelector('#typeClock');if(el)el.textContent=left.toFixed(1);if(left<=0&&!finished){finished=true;clearInterval(iv);const val=(arena.querySelector('#typeInput')?.value||'').toLowerCase().trim();const acc=similarity(val,phrase);const pts=Math.round(acc*100);challengeDone(pts,`+${pts} pts — ${Math.round(acc*100)}% accuracy`);}},100);
  window.checkType=function(target){if(finished)return;const val=(arena.querySelector('#typeInput')?.value||'').toLowerCase().trim();if(val===target){finished=true;clearInterval(iv);const elapsed=(Date.now()-startTime)/1000;const pts=elapsed<3?100:elapsed<5?90:elapsed<7?78:65;challengeDone(pts,`+${pts} pts — typed in ${elapsed.toFixed(1)}s!`);}};
}
function similarity(a,b){if(!b.length)return 0;let m=0;const len=Math.max(a.length,b.length);for(let i=0;i<Math.min(a.length,b.length);i++)if(a[i]===b[i])m++;return m/len;}
function runOddOne(arena){
  const shapes=['circle','square','triangle','diamond'];
  const mainShape=shapes[Math.floor(Math.random()*shapes.length)];
  let oddShape=mainShape;while(oddShape===mainShape)oddShape=shapes[Math.floor(Math.random()*shapes.length)];
  const total=9,oddIdx=Math.floor(Math.random()*total);const startTime=Date.now();
  function drawShape(type,size){const h=Math.round(size*0.866);if(type==='circle')return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:#534AB7;"></div>`;if(type==='square')return `<div style="width:${size}px;height:${size}px;background:#534AB7;border-radius:3px;"></div>`;if(type==='triangle')return `<div style="width:0;height:0;border-left:${Math.round(size/2)}px solid transparent;border-right:${Math.round(size/2)}px solid transparent;border-bottom:${h}px solid #534AB7;"></div>`;if(type==='diamond')return `<div style="width:${size}px;height:${size}px;background:#534AB7;transform:rotate(45deg);border-radius:2px;"></div>`;return '';}
  arena.innerHTML=`<p class="challenge-title">Odd one out!</p><p class="challenge-sub">Find the shape that's different! Faster = more points.</p><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:200px;">${Array.from({length:total},(_,i)=>`<button onclick="oddPick(${i},${i===oddIdx})" style="width:60px;height:60px;background:var(--surface);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;">${drawShape(i===oddIdx?oddShape:mainShape,28)}</button>`).join('')}</div>`;
  window._oddStart=startTime;
}
window.oddPick=function(i,isOdd){
  document.querySelectorAll('[onclick^="oddPick"]').forEach(b=>b.disabled=true);
  if(isOdd){const elapsed=(Date.now()-window._oddStart)/1000;const pts=elapsed<1?100:elapsed<2?85:elapsed<4?70:55;document.querySelectorAll('[onclick^="oddPick"]')[i].style.background='rgba(0,229,160,0.25)';challengeDone(pts,`+${pts} pts — found in ${elapsed.toFixed(1)}s!`);}
  else{challengeDone(0,'No points — wrong one!');}
};
function runHoldIt(arena){
  const target=2000+Math.floor(Math.random()*2000);let holding=false,startTime=0,done=false;
  arena.innerHTML=`<p class="challenge-title">Hold your horses!</p><p class="challenge-sub">Hold until the bar fills — release at the right moment!</p><div class="hold-bar-wrap" style="margin:8px 0;"><div class="hold-bar-fill" id="holdBar" style="width:0%;"></div></div><p style="font-size:12px;color:var(--muted);margin:0;" id="holdHint">Press and hold...</p><button id="holdBtn" style="padding:16px 40px;font-size:16px;font-weight:500;margin-top:8px;border-radius:10px;background:var(--accent);border:none;color:#fff;" onmousedown="holdStart()" onmouseup="holdEnd()" ontouchstart="event.preventDefault();holdStart()" ontouchend="holdEnd()">HOLD</button>`;
  let iv=null;
  window.holdStart=function(){if(done)return;holding=true;startTime=Date.now();iv=setInterval(()=>{if(!holding)return;const pct=Math.min(100,((Date.now()-startTime)/target)*100);const bar=arena.querySelector('#holdBar');if(bar)bar.style.width=pct+'%';},30);};
  window.holdEnd=function(){if(done||!holding)return;done=true;holding=false;clearInterval(iv);const held=Date.now()-startTime;const diff=Math.abs(held-target);const bar=arena.querySelector('#holdBar');if(bar)bar.style.width=Math.min(100,(held/target)*100)+'%';const hint=arena.querySelector('#holdHint');if(hint)hint.textContent=`Held ${(held/1000).toFixed(2)}s (target: ${(target/1000).toFixed(2)}s)`;const btn=arena.querySelector('#holdBtn');if(btn)btn.disabled=true;const pts=diff<100?100:diff<250?85:diff<500?65:diff<800?40:diff<1200?20:5;challengeDone(pts,`+${pts} pts`);};
}
function runSimon(arena){
  const rounds=5+Math.floor(Math.random()*4);let current=0,correct=0,done=false;
  const sequence=[...SIMON_COMMANDS].sort(()=>Math.random()-.5).slice(0,rounds);
  function showNext(){if(current>=rounds){done=true;const pts=norm(correct,0,rounds);challengeDone(pts,`+${pts} pts — ${correct}/${rounds} correct!`);return;}const cmd=sequence[current];arena.innerHTML=`<p class="challenge-title">Simon says...</p><p class="challenge-sub">Only react if Simon says to!</p><div class="simon-cmd">${cmd.text}</div><div style="display:flex;gap:10px;margin-top:12px;"><button onclick="simonAnswer(true)" style="flex:1;padding:12px;">React!</button><button onclick="simonAnswer(false)" style="flex:1;padding:12px;">Ignore</button></div><p style="font-size:12px;color:var(--muted);margin-top:8px;">Round ${current+1} of ${rounds}</p>`;}
  window.simonAnswer=function(reacted){if(done)return;const cmd=sequence[current];const isCorrect=(reacted&&cmd.isSimon)||(!reacted&&!cmd.isSimon);if(isCorrect)correct++;current++;setTimeout(showNext,300);};
  showNext();
}

document.addEventListener('click',function(e){
  const t=e.target.closest('button,div[onclick]');
  if(!t)return;
  const attr=t.getAttribute('onclick');
  if(!attr)return;
  try{
    const fn=attr.replace(/\(.*\)/,'').trim();
    const argsMatch=attr.match(/\(([^)]*)\)/);
    const args=argsMatch&&argsMatch[1]?argsMatch[1].split(',').map(a=>{a=a.trim();if(a==='true')return true;if(a==='false')return false;if(!isNaN(a))return Number(a);return a.replace(/^['"]|['"]$/g,'');}):[]; 
    if(window[fn])window[fn](...args);
  }catch(err){}
});
</script>
